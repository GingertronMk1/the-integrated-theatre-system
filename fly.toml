# fly.toml app configuration file generated for the-integrated-theatre-system on 2024-01-03T12:24:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "the-integrated-theatre-system"
primary_region = "lhr"

[build]
  dockerfile = "./_docker/config/live.dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
