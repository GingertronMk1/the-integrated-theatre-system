# fly.toml app configuration file generated for the-integrated-theatre-system-little-feather-4873 on 2024-01-03T12:27:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "the-integrated-theatre-system"
primary_region = "lhr"

[build]
  dockerfile = "_docker/config/live.dockerfile"

  [build.args]
    NODE_VERSION = "18"
    PHP_VERSION = "8.3"

[env]
  APP_ENV = "production"
  APP_RUNTIME = "App\\FlyRuntime"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "info"
  LOG_STDERR_FORMATTER = "Monolog\\Formatter\\JsonFormatter"
  SESSION_DRIVER = "cookie"
  SESSION_SECURE_COOKIE = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
