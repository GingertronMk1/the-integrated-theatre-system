name: Testing

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    testing:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v3
            - name: Cache Composer
              id: cache-composer
              uses: actions/cache@v3
              with:
                path: vendor
                key: ${{ hashFiles('composer.lock') }}
            - name: Cache NPM
              id: cache-npm
              uses: actions/cache@v3
              with:
                path: node_modules
                key: ${{ hashFiles('package-lock.json') }}
            - name: Quickly Adjust Xdebug
              run: echo "xdebug.client_host=0" >> _docker/config/app/php.ini
            - name: Install
              run: ./bin/util/install
            - name: Start
              run: ./bin/start
            - name: Pint
              run: ./bin/app/composer pint -- --test
              if: always()
            - name: Test
              run: ./bin/app/test
              if: always()
