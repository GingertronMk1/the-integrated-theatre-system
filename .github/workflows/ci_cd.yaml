name: CI/CD

on:
  push:
    branches: 
      main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout
          uses: actions/checkout@v3
        - name: Build
          run: ./_docker/bin/util/install
        - name: Deptrac
          run: ./_docker/bin/app/deptrac
        - name: ECS
          run: ./_docker/bin/app/ecs